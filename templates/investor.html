<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Scalehack — Investor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;min-height:100vh;display:flex;flex-direction:column}

/* PICK SCREEN */
#pick-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
#pick-screen h1{font-size:26px;font-weight:700;margin-bottom:6px;text-align:center}
#pick-screen p{font-size:15px;color:#6e6e73;margin-bottom:28px;text-align:center}
.name-input{width:100%;max-width:360px;padding:12px 16px;border:1.5px solid #d2d2d7;border-radius:12px;font-size:16px;outline:none;margin-bottom:12px;background:#fff}
.name-input:focus{border-color:#0071e3}
.firm-list{width:100%;max-width:360px;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.firm-btn{padding:14px 10px;border:1.5px solid #d2d2d7;border-radius:12px;background:#fff;font-size:14px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;color:#1d1d1f}
.firm-btn:hover{border-color:#0071e3;background:#f0f6ff;color:#0071e3}
.firm-btn.selected{border-color:#0071e3;background:#0071e3;color:#fff}
.start-btn{width:100%;max-width:360px;padding:14px;background:#0071e3;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.start-btn:disabled{opacity:.4;cursor:not-allowed}
.start-btn:hover:not(:disabled){opacity:.88}

/* CHAT SCREEN */
#chat-screen{flex:1;display:none;flex-direction:column}
.chat-header{background:#fff;border-bottom:1px solid #e5e5e5;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.firm-avatar{width:38px;height:38px;border-radius:50%;background:#0071e3;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.chat-header-info h3{font-size:15px;font-weight:600;margin:0}
.chat-header-info p{font-size:12px;color:#6e6e73;margin:0}

.messages{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:#f5f5f7}
.msg-bubble{max-width:78%;align-self:flex-end;background:#0071e3;color:#fff;padding:10px 14px;border-radius:18px 18px 4px 18px;font-size:15px;line-height:1.45;word-break:break-word}
.msg-time{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px}

.chat-input-bar{background:#fff;border-top:1px solid #e5e5e5;padding:12px 16px;display:flex;gap:10px;align-items:flex-end;position:sticky;bottom:0}
.chat-input{flex:1;padding:10px 14px;border:1.5px solid #d2d2d7;border-radius:20px;font-size:15px;outline:none;resize:none;max-height:100px;line-height:1.4;font-family:inherit}
.chat-input:focus{border-color:#0071e3}
.send-btn{width:40px;height:40px;border-radius:50%;background:#0071e3;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.send-btn:hover{opacity:.85}
.send-btn svg{width:18px;height:18px;fill:#fff}
</style>
</head>
<body>

<!-- PICK SCREEN -->
<div id="pick-screen">
  <h1>👋 Hi Investor</h1>
  <p>Pick your firm and introduce yourself.</p>
  <input class="name-input" id="sender-name" placeholder="Your name (e.g. Sarah Chen)" maxlength="50"/>
  <div class="firm-list">
    {% for f in firms %}
    <button class="firm-btn" data-id="{{ f.id }}" data-name="{{ f.name }}" onclick="selectFirm(this)">{{ f.name }}</button>
    {% endfor %}
  </div>
  <button class="start-btn" id="start-btn" onclick="startChat()" disabled>Start Chatting →</button>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="firm-avatar" id="firm-avatar"></div>
    <div class="chat-header-info">
      <h3 id="firm-label"></h3>
      <p id="sender-label"></p>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="msg-bubble" style="align-self:flex-start;background:#e5e5ea;color:#1d1d1f;border-radius:18px 18px 18px 4px">
      <div>Hi! Tell me about your startup. What are you building, and where are you with traction?</div>
    </div>
  </div>
  <div class="chat-input-bar">
    <textarea class="chat-input" id="chat-input" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
let selectedFirmId   = null;
let selectedFirmName = null;
let senderName       = null;

document.getElementById('sender-name').addEventListener('input', updateStartBtn);

function selectFirm(btn) {
  document.querySelectorAll('.firm-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedFirmId   = btn.dataset.id;
  selectedFirmName = btn.dataset.name;
  updateStartBtn();
}

function updateStartBtn() {
  const name = document.getElementById('sender-name').value.trim();
  document.getElementById('start-btn').disabled = !(selectedFirmId && name);
}

function startChat() {
  senderName = document.getElementById('sender-name').value.trim();
  if (!selectedFirmId || !senderName) return;

  // Setup chat header
  document.getElementById('firm-label').textContent = selectedFirmName;
  document.getElementById('sender-label').textContent = senderName;
  const initials = selectedFirmName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('firm-avatar').textContent = initials;

  document.getElementById('pick-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  document.getElementById('chat-input').focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  appendMessage(text);

  try {
    await fetch('/api/message', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ firm_id: selectedFirmId, firm_name: selectedFirmName, sender_name: senderName, text })
    });
  } catch(e) { console.error(e); }
}

function appendMessage(text) {
  const msgs = document.getElementById('messages');
  const now  = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const div  = document.createElement('div');
  div.className = 'msg-bubble';
  div.innerHTML = `<div>${escHtml(text)}</div><div class="msg-time">${now}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// Auto-resize textarea
document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('chat-input');
  if (ta) ta.addEventListener('input', () => { ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; });
});
</script>
</body>
</html>
